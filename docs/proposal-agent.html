<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- built: 20260323083656 -->
<title>提案書ドラフトエージェント</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0f0e;
    --surface: #141715;
    --surface2: #1a1d1b;
    --border: #242725;
    --border2: #2e3330;
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.12);
    --accent2: #a3e635;
    --text: #e8ede9;
    --text2: #8fa890;
    --text3: #5a6b5c;
    --red: #f87171;
    --yellow: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 380px 1fr;
    grid-template-rows: auto 1fr;
  }

  @media (max-width: 900px) {
    body { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
  }

  /* Top bar */
  .topbar {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .topbar-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .topbar-sub {
    font-size: 11px;
    color: var(--text3);
    margin-left: 4px;
  }

  .topbar-badge {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(74,222,128,0.2);
  }

  /* Left panel - input form */
  .left-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    overflow-y: auto;
    height: calc(100vh - 61px);
  }

  .panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  label .required {
    color: var(--red);
    font-size: 10px;
  }

  input, textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,222,128,0.1);
  }

  select option { background: var(--surface2); }

  textarea { min-height: 80px; }

  .service-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .chip:hover { border-color: var(--accent); color: var(--accent); }

  .chip.selected {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #0d0f0e;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .generate-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #0d0f0e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  .generate-btn.loading .spinner { display: block; }
  .generate-btn.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Right panel - output */
  .right-panel {
    padding: 28px 32px;
    overflow-y: auto;
    height: calc(100vh - 61px);
  }

  .output-placeholder {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text3);
    text-align: center;
  }

  .placeholder-icon {
    font-size: 48px;
    opacity: 0.4;
  }

  .placeholder-text {
    font-size: 14px;
    line-height: 1.6;
    max-width: 280px;
  }

  /* Proposal output */
  .proposal-output { display: none; }
  .proposal-output.visible { display: block; }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .output-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
  }

  .output-actions {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .action-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .action-btn.primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Proposal content */
  .proposal-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .proposal-section {
    padding: 22px 26px;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.4s ease both;
  }

  .proposal-section:last-child { border-bottom: none; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .section-num {
    width: 24px;
    height: 24px;
    background: var(--accent-dim);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.5px;
  }

  .section-body {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  .section-body.streaming::after {
    content: '▋';
    color: var(--accent);
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
    height: 14px;
    margin-bottom: 8px;
  }

  .skeleton.wide { width: 100%; }
  .skeleton.medium { width: 75%; }
  .skeleton.short { width: 45%; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .error-msg {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 10px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 13px;
    line-height: 1.6;
    margin-top: 16px;
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-icon">💼</div>
  <div>
    <span class="topbar-title">提案書ドラフトエージェント</span>
    <span class="topbar-sub">by いいおっち</span>
  </div>
  <div class="topbar-badge">Claude API powered</div>
</div>

<!-- Left: Input -->
<div class="left-panel">
  <div class="panel-label">ヒアリング情報を入力</div>

  <div class="form-group">
    <label>クライアント名・会社名 <span class="required">*</span></label>
    <input type="text" id="client" placeholder="例：株式会社〇〇 / 田中様">
  </div>

  <div class="form-group">
    <label>担当者の役職・立場</label>
    <input type="text" id="role" placeholder="例：DX推進部 課長 / 経営企画室長">
  </div>

  <div class="form-group">
    <label>現在の課題・悩み <span class="required">*</span></label>
    <textarea id="problem" placeholder="例：生成AIを導入したいが何から始めればいいかわからない。現場の抵抗が強く推進が止まっている。"></textarea>
  </div>

  <div class="form-group">
    <label>ゴール・目指したい状態</label>
    <textarea id="goal" placeholder="例：半年以内に主要3部門でAIツールを定着させたい" style="min-height:60px;"></textarea>
  </div>

  <div class="form-group">
    <label>提供するサービス <span class="required">*</span></label>
    <div class="service-chips">
      <div class="chip" onclick="toggleChip(this)" data-val="生成AI導入・活用推進コンサル">生成AI導入推進</div>
      <div class="chip" onclick="toggleChip(this)" data-val="DX戦略立案・ロードマップ設計">DX戦略設計</div>
      <div class="chip" onclick="toggleChip(this)" data-val="変革マネジメント・現場浸透支援">変革マネジメント</div>
      <div class="chip" onclick="toggleChip(this)" data-val="Tableau・データ分析基盤構築">Tableau/データ基盤</div>
      <div class="chip" onclick="toggleChip(this)" data-val="社内研修・ワークショップ">研修・WS登壇</div>
    </div>
  </div>

  <div class="form-group">
    <label>想定期間・スケジュール</label>
    <input type="text" id="duration" placeholder="例：2025年4月〜6月（3ヶ月）/ 単発1日">
  </div>

  <div class="form-group">
    <label>予算感（任意）</label>
    <select id="budget">
      <option value="">未確認・不明</option>
      <option value="〜30万円">〜30万円</option>
      <option value="30〜100万円">30〜100万円</option>
      <option value="100〜300万円">100〜300万円</option>
      <option value="300万円〜">300万円〜</option>
    </select>
  </div>

  <div class="form-group">
    <label>その他・補足情報</label>
    <textarea id="notes" placeholder="例：競合他社で同様の取り組みが進んでいる。社内にITリテラシーの高い推進者がいる。" style="min-height:60px;"></textarea>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generateProposal()">
    <div class="spinner"></div>
    <span class="btn-text">✦ 提案書ドラフトを生成する</span>
  </button>
</div>

<!-- Right: Output -->
<div class="right-panel">
  <div class="output-placeholder" id="placeholder">
    <div class="placeholder-icon">📄</div>
    <div class="placeholder-text">左のフォームにヒアリング情報を入力して<br>「提案書ドラフトを生成する」を押してください</div>
  </div>

  <div class="proposal-output" id="proposalOutput">
    <div class="output-header">
      <div class="output-title">提案書ドラフト</div>
      <div class="output-actions">
        <button class="action-btn" onclick="copyAll()">📋 全文コピー</button>
        <button class="action-btn primary" onclick="regenerate()">↺ 再生成</button>
      </div>
    </div>
    <div class="proposal-content" id="proposalContent"></div>
    <div class="error-msg" id="errorMsg" style="display:none;"></div>
  </div>
</div>

<script src="api-client.js?v=1774254405"></script>
<script>
  function toggleChip(el) {
    el.classList.toggle('selected');
  }

  function getSelectedServices() {
    return [...document.querySelectorAll('.chip.selected')]
      .map(c => c.dataset.val).join('、');
  }

  async function generateProposal() {
    const client = document.getElementById('client').value.trim();
    const problem = document.getElementById('problem').value.trim();
    const services = getSelectedServices();

    if (!client || !problem || !services) {
      alert('クライアント名・課題・サービスは必須です');
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.classList.add('loading');

    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('proposalOutput').classList.add('visible');
    document.getElementById('errorMsg').style.display = 'none';

    // Show skeleton loading
    const content = document.getElementById('proposalContent');
    content.innerHTML = `
      <div class="proposal-section">
        <div class="skeleton wide"></div>
        <div class="skeleton medium"></div>
        <div class="skeleton wide"></div>
        <div class="skeleton short"></div>
      </div>
      <div class="proposal-section">
        <div class="skeleton wide"></div>
        <div class="skeleton medium"></div>
        <div class="skeleton wide"></div>
      </div>
      <div class="proposal-section">
        <div class="skeleton medium"></div>
        <div class="skeleton wide"></div>
        <div class="skeleton short"></div>
      </div>
    `;

    const role = document.getElementById('role').value.trim();
    const goal = document.getElementById('goal').value.trim();
    const duration = document.getElementById('duration').value.trim();
    const budget = document.getElementById('budget').value;
    const notes = document.getElementById('notes').value.trim();

    const prompt = `あなたはDX・生成AI活用推進の個人コンサルタント「いいおっち（飯尾航史）」です。
以下のヒアリング情報をもとに、プロフェッショナルな提案書ドラフトを日本語で作成してください。

【ヒアリング情報】
- クライアント: ${client}
- 担当者役職: ${role || '不明'}
- 現在の課題: ${problem}
- ゴール: ${goal || '未確認'}
- 提供サービス: ${services}
- 期間: ${duration || '要相談'}
- 予算感: ${budget || '未確認'}
- 補足: ${notes || 'なし'}

【コンサルタントプロフィール】
- トヨタ自動車九州でDX推進・生成AI全社展開を担当
- グロービス経営大学院MBA取得
- 強み：生成AI導入推進、Tableau/データ基盤構築、DX戦略立案、現場抵抗を突破する変革マネジメント、経営層への合意形成

以下の7つのセクションで提案書を構成し、各セクションをJSON形式で返してください。
JSONのみを返し、説明文やマークダウン記法は一切含めないこと。

{
  "sections": [
    {"title": "現状認識と課題の整理", "content": "..."},
    {"title": "ご提案の概要", "content": "..."},
    {"title": "アプローチ・進め方", "content": "..."},
    {"title": "期待される成果・効果", "content": "..."},
    {"title": "スケジュール（案）", "content": "..."},
    {"title": "費用・条件", "content": "..."},
    {"title": "担当コンサルタントについて", "content": "..."}
  ]
}`;

    try {
      const _api = createApi();
      if (!_api) throw new Error('GAS URLが未設定です。settings.htmlで接続設定をしてください。');
      const raw = await _api.callClaude([{ role: 'user', content: prompt }]);
      
      let parsed;
      try {
        // { } ブロックを正規表現で抽出してパース（markdown記法に対応）
        const match = raw.match(/\{[\s\S]*\}/);
        if (!match) throw new Error('JSONが見つかりません');
        parsed = JSON.parse(match[0]);
      } catch(e) {
        throw new Error('レスポンスのパースに失敗しました。再試行してください。');
      }

      content.innerHTML = '';
      parsed.sections.forEach((sec, i) => {
        const div = document.createElement('div');
        div.className = 'proposal-section';
        div.style.animationDelay = `${i * 0.08}s`;
        div.innerHTML = `
          <div class="section-header">
            <div class="section-num">${String(i + 1).padStart(2, '0')}</div>
            <div class="section-title">${sec.title}</div>
          </div>
          <div class="section-body">${sec.content}</div>
        `;
        content.appendChild(div);
      });

    } catch (err) {
      content.innerHTML = '';
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'block';
      errEl.textContent = `エラー: ${err.message}`;
    }

    btn.disabled = false;
    btn.classList.remove('loading');
  }

  function regenerate() { generateProposal(); }

  function copyAll() {
    const sections = document.querySelectorAll('.proposal-section');
    let text = '【提案書ドラフト】\n\n';
    sections.forEach((s, i) => {
      const title = s.querySelector('.section-title')?.textContent || '';
      const body = s.querySelector('.section-body')?.textContent || '';
      text += `■ ${title}\n${body}\n\n`;
    });
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.action-btn');
      btn.textContent = '✓ コピーしました';
      setTimeout(() => btn.textContent = '📋 全文コピー', 2000);
    });
  }
</script>
</body>
</html>

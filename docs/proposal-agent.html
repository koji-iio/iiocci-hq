<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- built: 20260323083656 -->
<title>提案書ドラフトエージェント</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0f0e;
    --surface: #141715;
    --surface2: #1a1d1b;
    --border: #242725;
    --border2: #2e3330;
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.12);
    --accent2: #a3e635;
    --text: #e8ede9;
    --text2: #8fa890;
    --text3: #5a6b5c;
    --red: #f87171;
    --yellow: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 380px 1fr;
    grid-template-rows: auto 1fr;
  }

  @media (max-width: 900px) {
    body { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
  }

  /* Top bar */
  .topbar {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .topbar-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .topbar-sub {
    font-size: 11px;
    color: var(--text3);
    margin-left: 4px;
  }

  .topbar-badge {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(74,222,128,0.2);
  }

  /* Left panel - input form */
  .left-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    overflow-y: auto;
    height: calc(100vh - 61px);
  }

  .panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  label .required {
    color: var(--red);
    font-size: 10px;
  }

  input, textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,222,128,0.1);
  }

  select option { background: var(--surface2); }

  textarea { min-height: 80px; }

  .service-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .chip:hover { border-color: var(--accent); color: var(--accent); }

  .chip.selected {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  .generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #0d0f0e;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .generate-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #0d0f0e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  .generate-btn.loading .spinner { display: block; }
  .generate-btn.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Right panel - output */
  .right-panel {
    padding: 28px 32px;
    overflow-y: auto;
    height: calc(100vh - 61px);
  }

  .output-placeholder {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text3);
    text-align: center;
  }

  .placeholder-icon {
    font-size: 48px;
    opacity: 0.4;
  }

  .placeholder-text {
    font-size: 14px;
    line-height: 1.6;
    max-width: 280px;
  }

  /* Proposal output */
  .proposal-output { display: none; }
  .proposal-output.visible { display: block; }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .output-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
  }

  .output-actions {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .action-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .action-btn.primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Proposal content */
  .proposal-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .proposal-section {
    padding: 22px 26px;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.4s ease both;
  }

  .proposal-section:last-child { border-bottom: none; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .section-num {
    width: 24px;
    height: 24px;
    background: var(--accent-dim);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.5px;
  }

  .section-body {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  .section-body.streaming::after {
    content: '▋';
    color: var(--accent);
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
    height: 14px;
    margin-bottom: 8px;
  }

  .skeleton.wide { width: 100%; }
  .skeleton.medium { width: 75%; }
  .skeleton.short { width: 45%; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .error-msg {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 10px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 13px;
    line-height: 1.6;
    margin-top: 16px;
  }
</style>
</head>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-icon">💼</div>
  <div>
    <span class="topbar-title">提案書ドラフトエージェント</span>
    <span class="topbar-sub">by 飯尾航史</span>
  </div>
  <div class="topbar-badge">Claude API powered</div>
</div>

<!-- Left: Input -->
<div class="left-panel">
  <div class="panel-label">ヒアリング情報を入力</div>

  <!-- GLOBIS方式：まず聴き手を理解する -->
  <div style="background:rgba(0,180,166,0.08);border:1px solid rgba(0,180,166,0.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:#00B4A6;line-height:1.6;">
    💡 GLOBIS方式：まず「誰に・何を・なぜ今」を明確にしてから提案を設計します
  </div>

  <!-- Step 1: 聴き手を知る -->
  <div style="font-size:11px;font-weight:700;color:#005F73;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;">Step 1 — 聴き手を理解する</div>

  <div class="form-group">
    <label>クライアント名・会社名 <span class="required">*</span></label>
    <input type="text" id="client" placeholder="例：株式会社〇〇 / 田中様">
  </div>

  <div class="form-group">
    <label>担当者の役職・立場 <span style="font-size:10px;color:#666;">（意思決定者か推進者か）</span></label>
    <input type="text" id="role" placeholder="例：DX推進部 課長 / 経営企画室長（意思決定権あり）">
  </div>

  <div class="form-group">
    <label>聴き手の関心・優先事項 <span style="font-size:10px;color:#666;">（何を気にしているか）</span></label>
    <input type="text" id="interest" placeholder="例：コスト削減・競合対策・社内承認の取得">
  </div>

  <!-- Step 2: 課題を設定する -->
  <div style="font-size:11px;font-weight:700;color:#005F73;letter-spacing:1px;margin:16px 0 8px;text-transform:uppercase;">Step 2 — 課題を設定する</div>

  <div class="form-group">
    <label>現在の課題・悩み <span class="required">*</span></label>
    <textarea id="problem" placeholder="例：DXを推進したいが方向性が定まらない。現場抵抗が強く推進が止まっている。"></textarea>
  </div>

  <div class="form-group">
    <label>ゴール・目指したい状態 <span style="font-size:10px;color:#666;">（プレゼン後にどうなってほしいか）</span></label>
    <textarea id="goal" placeholder="例：半年以内に主要3部門でAIツールを定着させたい" style="min-height:55px;"></textarea>
  </div>

  <!-- Step 3: 提案を設計する -->
  <div style="font-size:11px;font-weight:700;color:#005F73;letter-spacing:1px;margin:16px 0 8px;text-transform:uppercase;">Step 3 — 提案を設計する</div>

  <div class="form-group">
    <label>提供するサービス <span class="required">*</span></label>
    <div class="service-chips">
      <div class="chip" onclick="toggleChip(this)" data-val="生成AI導入・活用推進コンサル">生成AI導入推進</div>
      <div class="chip" onclick="toggleChip(this)" data-val="DX戦略立案・ロードマップ設計">DX戦略設計</div>
      <div class="chip" onclick="toggleChip(this)" data-val="変革マネジメント・現場浸透支援">変革マネジメント</div>
      <div class="chip" onclick="toggleChip(this)" data-val="Tableau・データ分析基盤構築">Tableau/データ基盤</div>
      <div class="chip" onclick="toggleChip(this)" data-val="社内研修・ワークショップ">研修・WS登壇</div>
    </div>
  </div>

  <div class="form-group">
    <label>想定期間・スケジュール</label>
    <input type="text" id="duration" placeholder="例：2026年4月〜6月（3ヶ月）/ 単発1日">
  </div>

  <div class="form-group">
    <label>予算感（任意）</label>
    <select id="budget">
      <option value="">未確認・不明</option>
      <option value="〜30万円">〜30万円</option>
      <option value="30〜100万円">30〜100万円</option>
      <option value="100〜300万円">100〜300万円</option>
      <option value="300万円〜">300万円〜</option>
    </select>
  </div>

  <div class="form-group">
    <label>補足情報 <span style="font-size:10px;color:#666;">（競合状況・社内事情・制約など）</span></label>
    <textarea id="notes" placeholder="例：競合他社でDXが進んでいる。社内にITリテラシーの高い推進者がいる。" style="min-height:55px;"></textarea>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="generateProposal()">
    <div class="spinner"></div>
    <span class="btn-text">✦ 提案書ドラフトを生成する</span>
  </button>
</div>

<!-- Right: Output -->
<div class="right-panel">
  <div class="output-placeholder" id="placeholder">
    <div class="placeholder-icon">📄</div>
    <div class="placeholder-text">左のフォームにヒアリング情報を入力して<br>「提案書ドラフトを生成する」を押してください</div>
  </div>

  <div class="proposal-output" id="proposalOutput">
    <div class="output-header">
      <div class="output-title">提案書ドラフト</div>
      <div class="output-actions">
        <button class="action-btn" onclick="copyAll()">📋 全文コピー</button>
        <button class="action-btn" id="slideBtn" onclick="generateSlides()" style="display:none;">🖥 スライド生成</button>
        <button class="action-btn primary" onclick="regenerate()">↺ 再生成</button>
      </div>
    </div>
    <div class="proposal-content" id="proposalContent"></div>
    <div class="error-msg" id="errorMsg" style="display:none;"></div>

    <!-- スライドプレビューエリア -->
    <div id="slideArea" style="display:none;margin-top:24px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-size:14px;font-weight:600;color:#e2e8f0;">🖥 提案スライド</div>
        <button id="downloadBtn" class="action-btn primary" onclick="downloadSlides()">⬇ PPTXダウンロード</button>
      </div>
      <div id="slidePreview" style="display:flex;flex-direction:column;gap:12px;"></div>
    </div>
  </div>
</div>

<script src="api-client.js?v=1774254405"></script>
<script>
  function toggleChip(el) { el.classList.toggle('selected'); }
  function getSelectedServices() {
    return [...document.querySelectorAll('.chip.selected')].map(c => c.dataset.val).join('、');
  }

  // ── 提案書生成（GLOBIS方式ストーリーライン） ──────────────
  async function generateProposal() {
    const client   = document.getElementById('client').value.trim();
    const problem  = document.getElementById('problem').value.trim();
    const services = getSelectedServices();
    if (!client || !problem || !services) {
      alert('クライアント名・課題・サービスは必須です'); return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true; btn.classList.add('loading');
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('proposalOutput').classList.add('visible');
    document.getElementById('errorMsg').style.display = 'none';

    const content = document.getElementById('proposalContent');
    content.innerHTML = `
      <div class="proposal-section"><div class="skeleton wide"></div><div class="skeleton medium"></div><div class="skeleton wide"></div><div class="skeleton short"></div></div>
      <div class="proposal-section"><div class="skeleton wide"></div><div class="skeleton medium"></div><div class="skeleton wide"></div></div>
      <div class="proposal-section"><div class="skeleton medium"></div><div class="skeleton wide"></div><div class="skeleton short"></div></div>`;

    const role     = document.getElementById('role').value.trim();
    const interest = document.getElementById('interest').value.trim();
    const goal     = document.getElementById('goal').value.trim();
    const duration = document.getElementById('duration').value.trim();
    const budget   = document.getElementById('budget').value;
    const notes    = document.getElementById('notes').value.trim();

    const prompt = `あなたはGLOBIS経営大学院でビジネスプレゼンテーションを学んだDX・生成AIコンサルタント「飯尾航史」です。
GLOBISのBUP（Business Presentation）メソッドに基づき、受注を勝ち取るための提案書を作成してください。

【GLOBISプレゼン設計の原則】
1. 目的：聴き手にどうなってほしいか（行動変容を明確に）
2. 聴き手分析：立場・関心・現状・懸念を深く理解する
3. 導き方：メッセージ（1文の核心）＋ロジック（根拠3点）
4. ストーリーライン：現状認識→問題の本質→解決策→行動促進の流れ
5. スライド構成：メッセージファースト（結論から入る）

【ヒアリング情報】
- クライアント: ${client}
- 担当者役職: ${role || '不明'}
- 聴き手の関心・優先事項: ${interest || '未確認'}
- 現在の課題: ${problem}
- ゴール（プレゼン後に望む状態）: ${goal || '未確認'}
- 提供サービス: ${services}
- 期間: ${duration || '要相談'}
- 予算感: ${budget || '未確認'}
- 補足: ${notes || 'なし'}

【飯尾航史のプロフィール】
- トヨタ自動車九州 デジタル変革推進部・生成AI全社推進担当
- Microsoft Copilot全社展開・Tableau導入・DX戦略立案の実務経験
- グロービス経営大学院MBA取得
- 強み：製造業の現場を知る・経営層への合意形成・変革マネジメント

以下の構成でJSON形式のみ返してください（説明文・マークダウン記法一切不要）：
{
  "core_message": "この提案の核心メッセージ（1文・聴き手の行動変容を促す）",
  "sections": [
    {"title": "貴社が今、変革の岐路に立つ理由", "content": "現状認識と問題の本質。聴き手の課題に深く共感する内容。"},
    {"title": "このままでは何が起きるか", "content": "現状維持のリスクと機会損失。危機感を醸成する。"},
    {"title": "飯尾航史が提案する解決の全体像", "content": "3フェーズのアプローチと具体的な提供価値。"},
    {"title": "なぜこのアプローチが機能するのか", "content": "根拠3点。製造業DXの実務経験に基づく差別化ポイント。"},
    {"title": "プロジェクトで実現できる成果", "content": "定量・定性の効果。ROIと組織変革の両面から。"},
    {"title": "スケジュールと進め方", "content": "フェーズ別の具体的なスケジュール。"},
    {"title": "ご投資とその先にある価値", "content": "費用感と投資対効果。次のアクションを明確に。"}
  ]
}`;

    try {
      const _api = createApi();
      if (!_api) throw new Error('GAS URLが未設定です。settings.htmlで接続設定をしてください。');
      const raw = await _api.callClaude([{ role: 'user', content: prompt }]);
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('JSONが見つかりません');
      const parsed = JSON.parse(match[0]);

      // コアメッセージを表示
      content.innerHTML = '';
      if (parsed.core_message) {
        const msgDiv = document.createElement('div');
        msgDiv.style.cssText = 'background:linear-gradient(135deg,rgba(0,95,115,0.15),rgba(0,180,166,0.1));border:1px solid rgba(0,180,166,0.3);border-radius:10px;padding:16px 20px;margin-bottom:20px;';
        msgDiv.innerHTML = `<div style="font-size:10px;color:#00B4A6;font-weight:700;letter-spacing:2px;margin-bottom:6px;">CORE MESSAGE</div><div style="font-size:14px;color:#e2e8f0;font-weight:600;line-height:1.6;">"${parsed.core_message}"</div>`;
        content.appendChild(msgDiv);
      }

      parsed.sections.forEach((sec, i) => {
        const div = document.createElement('div');
        div.className = 'proposal-section';
        div.style.animationDelay = `${i * 0.08}s`;
        div.innerHTML = `
          <div class="section-header">
            <div class="section-num">${String(i + 1).padStart(2, '0')}</div>
            <div class="section-title">${sec.title}</div>
          </div>
          <div class="section-body">${sec.content}</div>`;
        content.appendChild(div);
      });

      document.getElementById('slideBtn').style.display = 'inline-flex';
      document.getElementById('slideArea').style.display = 'none';
      _slideData = null;

      // Notionに保存
      saveToNotion(client, role, problem, goal, services, duration, budget, notes, parsed);

    } catch (err) {
      content.innerHTML = '';
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'block';
      errEl.textContent = `エラー: ${err.message}`;
    }
    btn.disabled = false; btn.classList.remove('loading');
  }

  // ── Notionへ保存 ──────────────────────────────────────
  async function saveToNotion(client, role, problem, goal, services, duration, budget, notes, parsed) {
    const api = createApi();
    if (!api) return;
    try {
      const today = new Date().toISOString().split('T')[0];
      const proposalText = parsed.sections.map(s => `■ ${s.title}\n${s.content}`).join('\n\n');
      await api.append('proposals', {
        client, role, problem, goal, services, duration, budget, notes,
        core_message: parsed.core_message || '',
        proposal_text: proposalText,
        date: today
      });
      console.log('Notionに保存しました');
    } catch(e) { console.log('Notion保存スキップ:', e.message); }
  }

  function regenerate() { generateProposal(); }

  function copyAll() {
    const sections = document.querySelectorAll('.proposal-section');
    let text = '【提案書ドラフト】\n\n';
    sections.forEach(s => {
      const title = s.querySelector('.section-title')?.textContent || '';
      const body  = s.querySelector('.section-body')?.textContent || '';
      text += `■ ${title}\n${body}\n\n`;
    });
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.action-btn');
      btn.textContent = '✓ コピーしました';
      setTimeout(() => btn.textContent = '📋 全文コピー', 2000);
    });
  }

  // ── スライドプレビュー生成 ──────────────────────────────
  let _slideData = null;

  async function generateSlides() {
    const sections = document.querySelectorAll('.proposal-section');
    if (!sections.length) return;
    const btn = document.getElementById('slideBtn');
    btn.textContent = '⏳ 生成中...'; btn.disabled = true;

    const sectionsData = [...sections].map(s => ({
      title: s.querySelector('.section-title')?.textContent || '',
      content: s.querySelector('.section-body')?.textContent || ''
    }));
    const client = document.getElementById('client').value.trim();

    try {
      const api = createApi();
      if (!api) throw new Error('GAS URLが未設定です');

      const prompt = `以下の提案書セクションをもとに、PowerPointスライド用データをJSON形式で作成してください。
クライアント：${client}
セクション：${sectionsData.map((s,i) => `${i+1}. ${s.title}：${s.content.substring(0,150)}`).join('\n')}

JSONのみ返してください：
{
  "title": "提案書タイトル（クライアント名含む・15字以内）",
  "subtitle": "サブタイトル（〜DX推進コンサルティング提案〜など）",
  "presenter": "飯尾航史",
  "date": "${new Date().getFullYear()}年${new Date().getMonth()+1}月",
  "slides": [
    {
      "title": "スライドタイトル（20字以内）",
      "message": "このスライドの核心メッセージ1文（25字以内）",
      "bullets": ["箇条書き1（25字以内）", "箇条書き2", "箇条書き3"],
      "type": "normal"
    }
  ]
}
slidesは7枚。typeは "normal"（白背景）または "impact"（ダーク背景・数字強調）。`;

      const raw = await api.callClaude([{role:'user', content: prompt}]);
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('JSONが見つかりません');
      _slideData = JSON.parse(match[0]);
    } catch(e) {
      _slideData = {
        title: `${client} 様　ご提案`,
        subtitle: '〜DX推進コンサルティング提案〜',
        presenter: '飯尾航史',
        date: `${new Date().getFullYear()}年${new Date().getMonth()+1}月`,
        slides: sectionsData.map(s => ({
          title: s.title,
          message: '',
          bullets: s.content.split('。').filter(t=>t.trim().length>5).slice(0,3).map(t=>t.trim().substring(0,35)),
          type: 'normal'
        }))
      };
    }

    renderSlidePreview(_slideData);
    btn.textContent = '🖥 スライド再生成'; btn.disabled = false;
  }

  function renderSlidePreview(data) {
    const preview = document.getElementById('slidePreview');
    preview.innerHTML = '';
    document.getElementById('slideArea').style.display = 'block';

    // 表紙プレビュー
    const cover = document.createElement('div');
    cover.style.cssText = 'background:linear-gradient(135deg,#0A1F2E 60%,#005F73);border-radius:8px;padding:36px 40px;color:#fff;min-height:140px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;';
    cover.innerHTML = `
      <div style="position:absolute;right:30px;top:50%;transform:translateY(-50%);font-size:80px;font-weight:900;color:rgba(0,180,166,0.08);letter-spacing:-4px;">DX</div>
      <div style="font-size:10px;color:#00B4A6;font-weight:700;letter-spacing:3px;margin-bottom:10px;">BUSINESS PROPOSAL</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px;line-height:1.3;">${data.title}</div>
      <div style="font-size:13px;color:#88C8D0;margin-bottom:18px;">${data.subtitle}</div>
      <div style="width:40px;height:2px;background:#00B4A6;margin-bottom:14px;"></div>
      <div style="font-size:12px;color:#aaa;">${data.presenter}　／　${data.date}</div>`;
    preview.appendChild(cover);

    // 各スライドプレビュー
    data.slides.forEach((slide, i) => {
      const el = document.createElement('div');
      const isDark = slide.type === 'impact';
      el.style.cssText = isDark
        ? 'background:#0A1F2E;border-radius:8px;padding:0;overflow:hidden;'
        : 'background:#F7FAFA;border:1px solid #B0D8DC;border-radius:8px;overflow:hidden;';

      el.innerHTML = isDark ? `
        <div style="background:#005F73;padding:12px 20px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:10px;color:rgba(255,255,255,0.5);font-weight:700;">0${i+1}</span>
          <span style="font-size:14px;font-weight:700;color:#fff;">${slide.title}</span>
        </div>
        <div style="padding:16px 20px;">
          ${slide.message ? `<div style="background:rgba(0,180,166,0.15);border-left:3px solid #00B4A6;padding:8px 12px;margin-bottom:12px;font-size:13px;font-weight:600;color:#00B4A6;">${slide.message}</div>` : ''}
          <ul style="margin:0;padding:0 0 0 16px;">${(slide.bullets||[]).map(b=>`<li style="color:#B0C8CC;font-size:12px;margin-bottom:6px;line-height:1.5;">${b}</li>`).join('')}</ul>
        </div>` : `
        <div style="background:#005F73;padding:10px 20px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:10px;color:rgba(255,255,255,0.6);font-weight:700;">0${i+1}</span>
          <span style="font-size:14px;font-weight:700;color:#fff;">${slide.title}</span>
        </div>
        <div style="padding:14px 20px;">
          ${slide.message ? `<div style="background:#E0F5F3;border:1px solid #00B4A6;border-radius:4px;padding:7px 12px;margin-bottom:10px;font-size:12px;font-weight:600;color:#005F73;">${slide.message}</div>` : ''}
          <ul style="margin:0;padding:0 0 0 16px;">${(slide.bullets||[]).map(b=>`<li style="color:#1A2E35;font-size:12px;margin-bottom:5px;line-height:1.5;">${b}</li>`).join('')}</ul>
        </div>`;
      preview.appendChild(el);
    });

    preview.scrollIntoView({behavior:'smooth', block:'start'});
  }

  // ── PPTXダウンロード（ブランドカラー・GLOBIS方式レイアウト） ──────
  async function downloadSlides() {
    if (!_slideData) { alert('先にスライドを生成してください'); return; }
    const btn = document.getElementById('downloadBtn');
    btn.textContent = '⏳ 生成中...'; btn.disabled = true;

    try {
      await loadScript('https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js');
      const pres = new PptxGenJS();
      pres.layout = 'LAYOUT_16x9';
      pres.title = _slideData.title;
      pres.author = _slideData.presenter;

      // ── ブランドカラー定義 ──
      const C = {
        dark:    '0A1F2E',  // ダーク（表紙・セクション背景）
        main:    '005F73',  // メイン（インダストリアルシアン）
        accent:  '00B4A6',  // アクセント（ティール）
        light:   'E0F5F3',  // ハイライト背景
        bg:      'F7FAFA',  // 本文スライド背景
        text:    '1A2E35',  // テキスト
        sub:     '4A7A82',  // サブテキスト
        border:  'B0D8DC',  // ボーダー
        white:   'FFFFFF',
      };
      const TOTAL = _slideData.slides.length + 2; // 表紙 + スライド + 最終

      // フッター共通関数
      const addFooter = (s, num) => {
        s.addShape(pres.ShapeType.rect, {x:0, y:5.35, w:10, h:0.275, fill:{color:C.dark}});
        s.addText(_slideData.presenter, {x:0.35, y:5.36, w:4, h:0.25, color:'4A7A82', fontSize:8, fontFace:'BIZ UDP Gothic', margin:0});
        s.addText(_slideData.date, {x:4, y:5.36, w:2, h:0.25, color:'4A7A82', fontSize:8, fontFace:'BIZ UDP Gothic', align:'center', margin:0});
        s.addText(`${num} / ${TOTAL}`, {x:9, y:5.36, w:0.7, h:0.25, color:C.accent, fontSize:8, fontFace:'BIZ UDP Gothic', align:'right', margin:0});
      };

      // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      // SLIDE 1: 表紙（ダーク背景・ブランドカラー）
      // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      const s1 = pres.addSlide();
      // 背景
      s1.addShape(pres.ShapeType.rect, {x:0, y:0, w:10, h:5.625, fill:{color:C.dark}});
      // 右側メインカラー帯
      s1.addShape(pres.ShapeType.rect, {x:6.8, y:0, w:3.2, h:5.625, fill:{color:C.main}});
      // アクセントライン
      s1.addShape(pres.ShapeType.rect, {x:6.6, y:0, w:0.08, h:5.625, fill:{color:C.accent}});
      // 左側アクセントライン
      s1.addShape(pres.ShapeType.rect, {x:0.5, y:1.8, w:0.8, h:0.04, fill:{color:C.accent}});
      // PROPOSAL ラベル
      s1.addText('BUSINESS PROPOSAL', {x:0.5, y:1.15, w:5.5, h:0.38, color:C.accent, fontSize:10, bold:true, charSpacing:4, fontFace:'BIZ UDP Gothic', margin:0});
      // メインタイトル
      s1.addText(_slideData.title, {x:0.5, y:1.95, w:5.9, h:1.6, color:C.white, fontSize:26, bold:true, fontFace:'BIZ UDP Gothic', margin:0, lineSpacingMultiple:1.3});
      // サブタイトル
      s1.addText(_slideData.subtitle, {x:0.5, y:3.65, w:5.8, h:0.45, color:'88C8D0', fontSize:13, fontFace:'BIZ UDP Gothic', margin:0});
      // 提出者情報
      s1.addText(_slideData.presenter, {x:0.5, y:4.45, w:3, h:0.35, color:C.white, fontSize:13, bold:true, fontFace:'BIZ UDP Gothic', margin:0});
      s1.addText(_slideData.date, {x:0.5, y:4.82, w:3, h:0.28, color:'4A7A82', fontSize:11, fontFace:'BIZ UDP Gothic', margin:0});
      // 右側デコ文字
      s1.addText('DX', {x:6.85, y:0.8, w:3.1, h:3.0, color:'FFFFFF0D', fontSize:110, bold:true, fontFace:'BIZ UDP Gothic', align:'center', margin:0});
      s1.addText('Strategy\nConsulting', {x:6.85, y:3.9, w:3.1, h:1.3, color:C.accent, fontSize:14, bold:true, fontFace:'BIZ UDP Gothic', align:'center', margin:0, lineSpacingMultiple:1.4});

      // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      // SLIDES 2〜N: コンテンツスライド（GLOBIS方式）
      // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      _slideData.slides.forEach((slide, i) => {
        const s = pres.addSlide();
        const isDark = slide.type === 'impact';

        if (isDark) {
          // ── インパクトスライド（ダーク背景） ──
          s.addShape(pres.ShapeType.rect, {x:0, y:0, w:10, h:5.625, fill:{color:C.dark}});
          s.addShape(pres.ShapeType.rect, {x:0, y:0, w:10, h:1.05, fill:{color:C.main}});
          s.addShape(pres.ShapeType.rect, {x:0, y:1.03, w:10, h:0.04, fill:{color:C.accent}});
          // スライド番号
          s.addText(`0${i+1}`, {x:0.3, y:0.12, w:0.65, h:0.72, color:'FFFFFF40', fontSize:22, bold:true, fontFace:'BIZ UDP Gothic', margin:0});
          // タイトル
          s.addText(slide.title, {x:1.1, y:0.18, w:8.6, h:0.68, color:C.white, fontSize:20, bold:true, fontFace:'BIZ UDP Gothic', margin:0});
          // メッセージライン（GLOBISの「メッセージを1文で」）
          if (slide.message) {
            s.addShape(pres.ShapeType.rect, {x:0.5, y:1.2, w:9, h:0.6, fill:{color:C.main}, line:{color:C.accent, pt:1}});
            s.addText(slide.message, {x:0.65, y:1.24, w:8.7, h:0.52, color:C.white, fontSize:13, bold:true, fontFace:'BIZ UDP Gothic', margin:0});
          }
          // 箇条書き（根拠3点）
          const bullets = (slide.bullets||[]).filter(b=>b.trim());
          let y = slide.message ? 2.0 : 1.4;
          bullets.forEach((b, bi) => {
            s.addShape(pres.ShapeType.rect, {x:0.5, y:y, w:0.5, h:0.5, fill:{color:C.accent}, rectRadius:0.06});
            s.addText(`${bi+1}`, {x:0.5, y:y, w:0.5, h:0.5, color:C.dark, fontSize:14, bold:true, fontFace:'BIZ UDP Gothic', align:'center', margin:0});
            s.addText(b, {x:1.15, y:y+0.04, w:8.4, h:0.44, color:'B0C8CC', fontSize:13, fontFace:'BIZ UDP Gothic', margin:0});
            y += 0.65;
          });
        } else {
          // ── 通常スライド（白背景・GLOBIS方式） ──
          s.addShape(pres.ShapeType.rect, {x:0, y:0, w:10, h:5.625, fill:{color:C.bg}});
          // ヘッダー（メインカラー）
          s.addShape(pres.ShapeType.rect, {x:0, y:0, w:10, h:1.05, fill:{color:C.main}});
          s.addShape(pres.ShapeType.rect, {x:0, y:1.03, w:10, h:0.04, fill:{color:C.accent}});
          // スライド番号
          s.addText(`0${i+1}`, {x:0.3, y:0.12, w:0.65, h:0.72, color:'FFFFFF40', fontSize:22, bold:true, fontFace:'BIZ UDP Gothic', margin:0});
          // タイトル（白テキスト on ダークヘッダー）
          s.addText(slide.title, {x:1.1, y:0.18, w:8.6, h:0.68, color:C.white, fontSize:20, bold:true, fontFace:'BIZ UDP Gothic', margin:0});
          // メッセージライン（ハイライト）
          if (slide.message) {
            s.addShape(pres.ShapeType.rect, {x:0.5, y:1.2, w:9, h:0.58, fill:{color:C.light}, line:{color:C.accent, pt:1}});
            s.addShape(pres.ShapeType.rect, {x:0.5, y:1.2, w:0.06, h:0.58, fill:{color:C.accent}});
            s.addText(slide.message, {x:0.72, y:1.24, w:8.65, h:0.5, color:C.main, fontSize:13, bold:true, fontFace:'BIZ UDP Gothic', margin:0});
          }
          // 箇条書き（根拠3点）
          const bullets = (slide.bullets||[]).filter(b=>b.trim());
          let y = slide.message ? 1.98 : 1.3;
          bullets.forEach((b, bi) => {
            s.addShape(pres.ShapeType.rect, {x:0.5, y:y+0.04, w:0.38, h:0.38, fill:{color:C.main}, rectRadius:0.04});
            s.addText(`${bi+1}`, {x:0.5, y:y+0.04, w:0.38, h:0.38, color:C.white, fontSize:12, bold:true, fontFace:'BIZ UDP Gothic', align:'center', margin:0});
            s.addText(b, {x:1.05, y:y, w:8.5, h:0.52, color:C.text, fontSize:12.5, fontFace:'BIZ UDP Gothic', margin:0, lineSpacingMultiple:1.3});
            y += 0.72;
          });
          // 右下にアクセントライン
          s.addShape(pres.ShapeType.rect, {x:9.5, y:1.1, w:0.04, h:4.0, fill:{color:C.border}});
        }
        addFooter(s, i + 2);
      });

      // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      // 最終スライド: クロージング
      // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      const last = pres.addSlide();
      last.addShape(pres.ShapeType.rect, {x:0, y:0, w:10, h:5.625, fill:{color:C.dark}});
      last.addShape(pres.ShapeType.rect, {x:0, y:0, w:10, h:0.06, fill:{color:C.accent}});
      last.addShape(pres.ShapeType.rect, {x:0, y:5.565, w:10, h:0.06, fill:{color:C.accent}});
      last.addShape(pres.ShapeType.rect, {x:3, y:2.9, w:4, h:0.06, fill:{color:C.main}});
      last.addText('ご清聴ありがとうございました', {x:1, y:1.6, w:8, h:0.8, color:C.white, fontSize:22, bold:true, fontFace:'BIZ UDP Gothic', align:'center', margin:0});
      last.addText('共に、変革を実現しましょう。', {x:1, y:3.1, w:8, h:0.5, color:C.accent, fontSize:14, fontFace:'BIZ UDP Gothic', align:'center', margin:0});
      last.addText(_slideData.presenter, {x:1, y:4.3, w:8, h:0.4, color:C.white, fontSize:13, bold:true, fontFace:'BIZ UDP Gothic', align:'center', margin:0});
      last.addText('トヨタ自動車九州 デジタル変革推進部 / グロービスMBA', {x:1, y:4.75, w:8, h:0.35, color:'4A7A82', fontSize:10, fontFace:'BIZ UDP Gothic', align:'center', margin:0});

      const filename = `【提案書】${document.getElementById('client').value.trim()||'クライアント'}_${_slideData.date}.pptx`;
      await pres.writeFile({fileName: filename});

    } catch(e) {
      alert('スライド生成エラー: ' + e.message);
    }
    btn.textContent = '⬇ PPTXダウンロード'; btn.disabled = false;
  }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      if (document.querySelector(`script[src="${src}"]`)) return resolve();
      const s = document.createElement('script');
      s.src = src; s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }
</script>
</body>
